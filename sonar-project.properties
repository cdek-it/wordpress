sonar.projectKey=cms_wordpress

# Дожидаться результата Quality Gate и возвращать ненулевой exit code, если он не пройден.
# Job sonarqube-check в .gitlab-ci.yml помечен allow_failure: true, поэтому такой "провал"
# не блокирует пайплайн — просто подсвечивает job жёлтым.
sonar.qualitygate.wait=true

# sonar.sources и sonar.tests обязаны давать непересекающиеся множества файлов — иначе
# сканер падает с "File ... can't be indexed twice". Поэтому tests/ явно вынесен и оттуда
# (sonar.exclusions), и указан отдельно как тестовый код (sonar.tests).
sonar.sources=.
sonar.exclusions=tests/**
sonar.tests=tests

# Пути к отчётам PHPUnit, которые генерирует job unit-tests в .gitlab-ci.yml
# (--log-junit / --coverage-clover). Без них сканер молча показывает Coverage: Not computed
# и не видит количество/статус тестов, даже если сами тесты в проекте есть.
sonar.php.tests.reportPath=junit-report.xml
sonar.php.coverage.reportPaths=coverage.xml
