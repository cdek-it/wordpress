---
image:
  name: docker-web.cdek.ru/phnodenx-dev-rocky9-8.2
  entrypoint: ['']
#
stages:
  - maintenance
  - validate
  - checks
  - sonar
  - build
  - upload
  - deploy
  - sync

variables:
  SELECT_JOB:
    value: "none"
    options:
      - "none"
      - "migrate_tag_to_github"
    description: "Выберите запуск job"

  MIGRATE_TAG:
    value: ""
    description: "Тег для переноса из GitLab в GitHub. Например: v4.2.5"

# Общие проверки для push в ветку (feature-ветку ИЛИ main) И для тега vX.Y.Z:
# validate -> checks (lint/static-analysis/unit-tests параллельно).
# Не запускается только при ручном запуске migrate_tag_to_github.
.branch_pipeline_rules: &branch_pipeline_rules
  - if: $SELECT_JOB == "migrate_tag_to_github"
    when: never
  - if: $CI_COMMIT_TAG
    when: always
  - if: $CI_COMMIT_BRANCH
    when: always

# Шаги основного пайплайна main (push после merge request) и тег-пайплайна (release candidate): sonar.
# build_custom/deploy-staging/github управляются собственными rules у соответствующих job.
.main_branch_rules: &main_branch_rules
  - if: $SELECT_JOB == "migrate_tag_to_github"
    when: never
  - if: $CI_COMMIT_TAG
    when: always
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    when: always
  - when: never

validate:
  image: docker-proxy.cdek.ru/php:8.2-alpine
  stage: validate
  tags:
    - docker
  rules: *branch_pipeline_rules
  variables:
    COMPOSER_CACHE_DIR: "${CI_PROJECT_DIR}/.composer-cache"
  cache:
    key:
      files:
        - composer.lock
    paths:
      - .composer-cache/
    policy: pull-push
  before_script:
    - set -eux
    - sed -i 's/dl-cdn.alpinelinux.org/repo.cdek.ru\/repository/g' /etc/apk/repositories
    - apk add --no-cache composer php84-ctype php84-dom php84-simplexml php84-tokenizer php84-xml php84-xmlwriter php84-xmlreader
    - command -v php >/dev/null || ln -s "$(command -v php84)" /usr/bin/php
    - composer --version
  script:
    - composer validate
    - composer install --no-interaction --prefer-dist --ignore-platform-req=ext-gmp
    - composer audit
  artifacts:
    paths:
      - vendor/
    expire_in: 1 hour

lint:
  image: docker-proxy.cdek.ru/php:8.2-alpine
  stage: checks
  tags:
    - docker
  rules: *branch_pipeline_rules
  variables:
    GIT_DEPTH: "0"
    YARN_CACHE_FOLDER: .yarn/cache
    YARN_ENABLE_GLOBAL_CACHE: "false"
    YARN_ENABLE_IMMUTABLE_INSTALLS: "true" # `workspaces focus` не понимает флаг --immutable, только эту переменную
    npm_config_cache: .npm
  cache:
    key:
      files:
        - yarn.lock
        - package.json
    paths:
      - .yarn/cache/
      - .yarn/install-state.gz
      - .npm/_prebuilds/
    policy: pull
  before_script:
    - set -eux
    - sed -i 's/dl-cdn.alpinelinux.org/repo.cdek.ru\/repository/g' /etc/apk/repositories
    - apk add --no-cache composer php84-ctype php84-dom php84-simplexml php84-tokenizer php84-xml php84-xmlwriter php84-xmlreader bash nodejs-current git
    - command -v php >/dev/null || ln -s "$(command -v php84)" /usr/bin/php
    - php -v
    - node --version
  script:
    - find src -name "*.php" -print0 | xargs -0 -n1 php -l
    - bash bin/phpcs-diff.sh
    # workspaces focus — ставит зависимости только корневого пакета, пропуская workspace guide (Docusaurus), для сборки которого тут нет нужных инструментов
    - node .yarn/releases/yarn-4.8.1.cjs workspaces focus
    - bash bin/lint-js-diff.sh
    - bash bin/lint-css-diff.sh

static-analysis:
  image: docker-proxy.cdek.ru/php:8.2-alpine
  stage: checks
  tags:
    - docker
  rules: *branch_pipeline_rules
  before_script:
    - set -eux
    - sed -i 's/dl-cdn.alpinelinux.org/repo.cdek.ru\/repository/g' /etc/apk/repositories
    - apk add --no-cache composer php84-ctype php84-dom php84-simplexml php84-tokenizer php84-xml php84-xmlwriter php84-xmlreader
    - command -v php >/dev/null || ln -s "$(command -v php84)" /usr/bin/php
  script:
    - vendor/bin/phpstan analyse --no-progress --memory-limit=1G

unit-tests:
  image: docker-proxy.cdek.ru/php:8.2-alpine
  stage: checks
  tags:
    - docker
  rules: *branch_pipeline_rules
  before_script:
    - set -eux
    - sed -i 's/dl-cdn.alpinelinux.org/repo.cdek.ru\/repository/g' /etc/apk/repositories
    - apk add --no-cache composer
    # `php84-*` пакеты из apk ставятся мимо кассы: у образа `php:8.2-alpine` уже есть свой
    # встроенный PHP в /usr/local/bin/php (со всеми нужными расширениями), поэтому
    # `command -v php` всегда находит именно его, а не apk-шный php84. Покрытие ставим
    # штатным для официального PHP-образа способом - через pecl + docker-php-ext-enable.
    - apk add --no-cache --virtual .build-deps $PHPIZE_DEPS
    # Кэш pecl-канала, вшитый в образ, может отставать от реальных релизов на pecl.php.net
    # без обновления `pecl install pcov-X` падает с "No releases available",
    # даже если версия реально существует в реестре.
    - pecl channel-update pecl.php.net
    - pecl install pcov-1.0.12
    - docker-php-ext-enable pcov
    - apk del .build-deps
    - php -v
    - php -m | grep -qi pcov
  script:
    - vendor/bin/phpunit --colors=never --log-junit junit-report.xml --coverage-clover=coverage.xml
  artifacts:
    when: always
    paths:
      - junit-report.xml
      - coverage.xml
    reports:
      junit: junit-report.xml

sonarqube-check:
  image:
    name: docker-proxy.cdek.ru/sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  tags:
    - docker
  stage: sonar
  rules: *main_branch_rules
  needs:
    - job: validate
      artifacts: true
    - job: unit-tests
      artifacts: true
  script:
    - sonar-scanner
  allow_failure: true

build_tag:
  image: docker-proxy.cdek.ru/php:8.2-alpine
  stage: build
  tags:
    - docker
  only:
    - tags

  variables:
    YARN_CACHE_FOLDER: .yarn/cache
    YARN_ENABLE_GLOBAL_CACHE: "false"
    YARN_ENABLE_IMMUTABLE_INSTALLS: "true" # `workspaces focus` не понимает флаг --immutable, только эту переменную
    YARN_ENABLE_INLINE_BUILDS: "true" # то же самое вместо флага --inline-builds (лог сборки нативных модулей сразу в вывод job'а)
    npm_config_cache: .npm

  cache:
    key:
      files:
        - yarn.lock
        - package.json
    paths:
      - .yarn/cache/
      - .yarn/install-state.gz
      - .npm/_prebuilds/
    policy: pull-push

  before_script:
    - set -eux
    - export RELEASE_VERSION=$(echo "${CI_COMMIT_TAG}" | sed 's/v//')
    - sed -i 's/dl-cdn.alpinelinux.org/repo.cdek.ru\/repository/g' /etc/apk/repositories
    - apk add --no-cache nodejs-current composer
    - composer --version
    - node --version

  script:
    - sed -i "s/\(Version:\)\( *\).*/\1\2${RELEASE_VERSION}/" cdek.php
    - sed -i "s/\(Stable tag:\)\( *\).*/\1\2${RELEASE_VERSION}/" README.md
    - sed -i "s/\(Project-Id-Version:\)\( *\).*/\1\2CDEKDelivery ${RELEASE_VERSION}\"/" lang/cdekdelivery.pot
    - |
      # workspaces focus - ставит зависимости только корневого пакета, пропуская workspace guide (Docusaurus), который в архив релиза и так не попадает
      for attempt in 1 2 3; do
        echo "Yarn install attempt ${attempt}/3"

        if node .yarn/releases/yarn-4.8.1.cjs workspaces focus; then
          break
        fi

        if [ "$attempt" -eq 3 ]; then
          echo "Yarn install failed after 3 attempts"
          exit 1
        fi

        echo "Yarn install failed, retrying in 20 seconds..."
        sleep 20
      done
    - node .yarn/releases/yarn-4.8.1.cjs build
    - rm -rf node_modules
    # `--update-no-dev` не даёт composer резолвить require-dev (phpunit/wpcs и т.п.) на этом шаге.
    # для release-сборки они не нужны и не установлены (ext-dom/tokenizer/simplexml отсутствуют).
    # `|| true`: при --no-install composer честно переписывает composer.json/lock, но ругается,
    # что пакет физически ещё лежит в vendor/ (ожидаемо до следующего шага с install).
    - composer remove --no-install --update-no-dev --ignore-platform-req=ext-gmp composer/installers || true
    - composer i -a --no-dev --ignore-platform-req=ext-gmp
    - php -r '$d = json_decode(file_get_contents("composer.json"), true); unset($d["repositories"]); file_put_contents("composer.json", json_encode($d, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . PHP_EOL);'
    - composer archive -f zip --file=cdek

  artifacts:
    name: cdek-integration
    paths:
      - cdek.zip

build-custom:
  image: docker-proxy.cdek.ru/php:8.2-alpine
  rules:
    - if: $SELECT_JOB == "migrate_tag_to_github"
      when: never
    - if: $CI_COMMIT_TAG
      when: manual
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    # feature-ветка: собрать zip автоматически после прохождения unit-tests
    - if: $CI_COMMIT_BRANCH
      when: on_success
    - when: manual
  stage: build
  tags:
    - docker
  variables:
    YARN_ENABLE_IMMUTABLE_INSTALLS: "true" # `workspaces focus` не понимает флаг --immutable, только эту переменную
    YARN_ENABLE_INLINE_BUILDS: "true" # то же самое вместо флага --inline-builds (лог сборки нативных модулей сразу в вывод job'а)
  artifacts:
    name: cdek-integration
    paths:
      - cdek.zip
  before_script:
    - !reference [build_tag, before_script]
    - export RELEASE_VERSION="${CI_COMMIT_REF_NAME}#${CI_COMMIT_SHORT_SHA}"
  script:
    - !reference [build_tag, script]

upload:
  stage: upload
  tags:
    - docker
  needs:
    - job: build_tag
      artifacts: true
  only:
    - tags
  before_script:
    - export RELEASE_VERSION=$(echo "${CI_COMMIT_TAG}" | sed 's/v//')
    - export ARCHIVE_VERSION=$(echo "${RELEASE_VERSION}" | sed 's/\./_/g')
  script:
    - curl -u "${NEXUS_LOGIN}":"${NEXUS_PASS}" --upload-file cdek.zip "${ARTIFACTORY_REPO}/$CI_PROJECT_NAME/$CI_COMMIT_BRANCH/wordpress_${ARCHIVE_VERSION}.zip"

release:
  stage: deploy
  tags:
    - docker
  needs:
    - job: upload
  rules:
    - when: never
  image: registry-gitlab.cdek.ru/gitlab-org/release-cli:latest
  before_script:
    - export RELEASE_VERSION=$(echo "${CI_COMMIT_TAG}" | sed 's/v//')
    - export ARCHIVE_VERSION=$(echo "${RELEASE_VERSION}" | sed 's/\./_/g')
  script:
    - |
      release-cli create --name $CI_COMMIT_TAG --tag-name $CI_COMMIT_TAG \
        --assets-link "{\"name\":\"Архив\",\"filepath\":\"/archive\",\"url\":\"${ARTIFACTORY_REPO}$CI_COMMIT_BRANCH/$CI_PROJECT_NAME/wordpress_${ARCHIVE_VERSION}.zip\", \"link_type\":\"package\"}" \

deploy-staging:
  stage: deploy
  image: docker-proxy.cdek.ru/alpine
  script:
    - rsync -avz -e "ssh -o StrictHostKeyChecking=no" --delete ./cdek.zip ${DEPLOY_USERNAME}@${DEPLOY_NODE}:${DEPLOY_DEST_DIR}/plugins
    - ssh ${DEPLOY_USERNAME}@${DEPLOY_NODE} "cd ${DEPLOY_DEST_DIR}/core && docker compose restart app"
  tags:
    - docker
  rules:
    # Временно отключено: стенд для staging ещё не поднят. Включить обратно, вернув
    # `- if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH` / `when: always`, когда появится DEPLOY_NODE.
    - when: never
  needs:
    - job: build-custom
      artifacts: true
  environment:
    name: dev2
    url: https://wordpress-cms.dev2.cdek.ru
  before_script:
    - sed -i 's/dl-cdn.alpinelinux.org/repo.cdek.ru\/repository/g' /etc/apk/repositories
    - test -r ~/.ssh || mkdir -p ~/.ssh
    - 'command -v ssh-agent >/dev/null || ( apk update && apk add openssh-client )'
    - 'command -v rsync >/dev/null || ( apk update && apk add rsync )'
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - eval $(ssh-agent -s)
    - ssh-add ~/.ssh/id_rsa

github:
  image: docker-proxy.cdek.ru/alpine
  stage: sync
  variables:
    GIT_DEPTH: 0
  tags:
    - docker
  rules:
    - if: $SELECT_JOB == "migrate_tag_to_github"
      when: never
    - if: $CI_COMMIT_REF_PROTECTED != "true"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: always
  before_script:
    - test -r ~/.ssh || mkdir -p ~/.ssh
    - echo "$SSH_CONFIG" > ~/.ssh/config
    - echo "$GITHUB_DEPLOY_KEY" > ~/.ssh/id_integrator
    - chmod 400 ~/.ssh/id_integrator
    - sed -i 's/dl-cdn.alpinelinux.org/repo.cdek.ru\/repository/g' /etc/apk/repositories
    - apk add --no-cache git netcat-openbsd openssh-client git-lfs
    - git remote add github "${GITHUB_REPO}" 2>/dev/null || git remote set-url github "${GITHUB_REPO}"
    - git fetch github
  script:
    # `-B` принудительно переставляет локальную ветку на origin/$CI_COMMIT_REF_NAME,
    # т.к. workspace раннера переиспользуется между запусками и просто `checkout`
    # может оставить ветку на устаревшем коммите с предыдущего пайплайна.
    - git checkout -B "$CI_COMMIT_REF_NAME" "origin/$CI_COMMIT_REF_NAME"
    - git push github "HEAD:refs/heads/$CI_COMMIT_REF_NAME"

migrate_tag_to_github:
  image: docker-proxy.cdek.tech/alpine
  stage: maintenance

  variables:
    GIT_DEPTH: "0"

  tags:
    - docker

  rules:
    # Только запуск через GitLab UI: Build → Pipelines → New pipeline
    - if: '$CI_PIPELINE_SOURCE != "web"'
      when: never

    # Не запускать из tag pipeline
    - if: '$CI_COMMIT_TAG'
      when: never

    # Только protected branch, чтобы были доступны protected variables
    - if: '$CI_COMMIT_REF_PROTECTED != "true"'
      when: never

    # Запускать только если явно выбрали эту job
    - if: '$SELECT_JOB == "migrate_tag_to_github"'
      when: on_success

    - when: never

  before_script:
    - set -eu

    - test -n "${MIGRATE_TAG:-}"
    - echo "${MIGRATE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'

    - mkdir -p ~/.ssh
    - echo "$SSH_CONFIG" > ~/.ssh/config
    - echo "$GITHUB_DEPLOY_KEY" > ~/.ssh/id_integrator
    - chmod 400 ~/.ssh/id_integrator

    - sed -i 's/dl-cdn.alpinelinux.org/repo.cdek.ru\/repository/g' /etc/apk/repositories
    - apk add --no-cache git netcat-openbsd openssh-client git-lfs

    - git lfs install --local

    - git remote remove github 2>/dev/null || true
    - git remote add github "${GITHUB_REPO}"

  script:
    - set -eu

    - echo "Migrating tag ${MIGRATE_TAG} from GitLab to GitHub"

    # Удаляем локальный тег, если он уже есть, чтобы точно взять его из GitLab origin
    - git tag -d "${MIGRATE_TAG}" 2>/dev/null || true

    # Забираем тег из GitLab
    - git fetch origin "refs/tags/${MIGRATE_TAG}:refs/tags/${MIGRATE_TAG}"

    # Commit, на который указывает GitLab tag
    - |
      export GITLAB_TAG_COMMIT="$(git rev-parse "${MIGRATE_TAG}^{commit}")"
      echo "GitLab ${MIGRATE_TAG} commit: ${GITLAB_TAG_COMMIT}"

    # Проверяем, есть ли такой тег в GitHub
    - |
      if git ls-remote --exit-code --tags github "refs/tags/${MIGRATE_TAG}" >/dev/null 2>&1; then
        echo "Tag ${MIGRATE_TAG} already exists in GitHub. Checking commit..."

        git tag -d "github-${MIGRATE_TAG}" 2>/dev/null || true
        git fetch github "+refs/tags/${MIGRATE_TAG}:refs/tags/github-${MIGRATE_TAG}"

        GITHUB_TAG_COMMIT="$(git rev-parse "github-${MIGRATE_TAG}^{commit}")"
        echo "GitHub ${MIGRATE_TAG} commit: ${GITHUB_TAG_COMMIT}"

        if [ "${GITLAB_TAG_COMMIT}" != "${GITHUB_TAG_COMMIT}" ]; then
          echo "ERROR: GitHub tag ${MIGRATE_TAG} points to different commit"
          exit 1
        fi

        echo "Tag ${MIGRATE_TAG} already exists in GitHub and points to the same commit. Nothing to migrate."
        exit 0
      fi

    # Проверяем, что коммит тега уже есть на GitHub
    - git fetch github main
    - |
      if ! git merge-base --is-ancestor "${GITLAB_TAG_COMMIT}" github/main; then
        echo "ERROR: commit ${GITLAB_TAG_COMMIT} (tag ${MIGRATE_TAG}) not found in GitHub main. Sync branches to GitHub first."
        exit 1
      fi

    # Пушим в GitHub именно существующий GitLab tag ref
    - git push github "refs/tags/${MIGRATE_TAG}:refs/tags/${MIGRATE_TAG}"

    - echo "Tag ${MIGRATE_TAG} migrated to GitHub successfully"
