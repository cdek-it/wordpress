version: "3"

vars:
  YARN: node .yarn/releases/yarn-4.8.1.cjs

tasks:
  build-dev:
    desc: "Сборка плагина → CDEKDelivery.zip"
    cmds:
      - "{{.YARN}}"
      - "{{.YARN}} build"
      - rm -rf node_modules
      - composer archive -f zip --file=CDEKDelivery

  test:
    desc: "Запуск PHPUnit тестов"
    cmds:
      - composer test

  test-coverage:
    desc: "PHPUnit с HTML-отчётом покрытия в .coverage-html (нужен xdebug или pcov)"
    cmds:
      - composer test-coverage

  validate:
    desc: "Проверка composer.json/composer.lock и уязвимостей зависимостей"
    cmds:
      - composer validate
      - composer audit

  lint:
    desc: "php -l + phpcs/eslint/stylelint по файлам, изменённым относительно main (как в CI)"
    cmds:
      - find src -name "*.php" -print0 | xargs -0 -n1 php -l
      - bash bin/phpcs-diff.sh
      - "{{.YARN}} install"
      - bash bin/lint-js-diff.sh
      - bash bin/lint-css-diff.sh

  lint-full:
    desc: "phpcs по всему src/ (для ручной уборки, не используется в CI)"
    cmds:
      - composer lint-full

  stan:
    desc: "Статический анализ PHPStan"
    cmds:
      - composer stan

  wp-up:
    desc: "Поднять WordPress + MySQL в докере (http://localhost:8080)"
    cmds:
      - docker compose up -d --build

  wp-down:
    desc: "Остановить и удалить контейнеры WordPress + MySQL (данные в volume сохраняются)"
    cmds:
      - docker compose down

  wp-clean:
    desc: "Полное удаление: контейнеры + volumes (БД и файлы WordPress стираются безвозвратно)"
    cmds:
      - docker compose down -v

  wp-dump-db:
    desc: "Сохранить дамп текущей БД в docker/db/dump.sql (подхватится автоматически при следующем поднятии на пустом volume)"
    cmds:
      - mkdir -p docker/db
      - docker compose exec -T db sh -c 'exec mysqldump -uroot -p"$MYSQL_ROOT_PASSWORD" --no-tablespaces "$MYSQL_DATABASE"' > docker/db/dump.sql
      - echo "Дамп сохранён в docker/db/dump.sql"
